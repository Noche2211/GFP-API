<!--
    frontend/pages/login.html
    Propósito: Página de la aplicación. Mantiene la interfaz y enlaza scripts/estilos apropiados.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor de Finanzas</title>
    <!--
        login.html
        Propósito: Página de inicio de sesión.
        - Muestra el formulario de login y notificaciones locales.
        - Incluye `../css/loginStyle.css`, `../js/main.js` y `../js/login.js`.
        - `login.js` contiene lógica placeholder para autenticación y notificaciones.
    -->
    <link rel="stylesheet" href="../css/loginStyle.css">
</head>

<body>

    <div class="container">
        <div class="login-card">

            <div class="avatar">
                <img src="../img/login.svg" alt="avatar">
            </div>

            <h2>Iniciar Sesion</h2>

            <form>
                <label for="email">Correo</label>
                <input type="email" id="email" placeholder="Usuario@gmail.com">

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="**********">

                <button type="button" onclick="loginUser()">Ingresar</button>
            </form>

            <a href="recuperarContrasena.html" class="forgot">¿Olvidaste tu contraseña?</a>
            <a href="crearCuenta.html" class="create">Crear cuenta</a>

        </div>
    </div>

    <!-- Notificación de éxito -->
    <div id="loginNotification" class="notification-toast">
        <div class="notification-content">
            <div class="notification-text">
                <strong>Iniciando sesión...</strong>
                <p>Cargando sus registros</p>
            </div>
            <span class="close-icon" onclick="hideNotification()">×</span>
        </div>
    </div>

    <div class="footer-bar"></div>

    <script src="../js/main.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
